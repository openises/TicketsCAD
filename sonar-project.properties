sonar.projectKey=ticketscad-newui
sonar.projectName=TicketsCAD NewUI
sonar.projectVersion=4.0-dev
sonar.sources=.
sonar.sourceEncoding=UTF-8
sonar.host.url=http://10.0.0.10:9000

# Scope: only the active NewUI codebase we own.
# Everything below is either 3rd-party vendored, generated, or out
# of scope for the NewUI quality bar.
sonar.exclusions=\
    vendor/**,\
    node_modules/**,\
    assets/vendor/**,\
    assets/leaflet/**,\
    assets/lib/**,\
    lib/**,\
    cache/**,\
    dist/**,\
    docs/**,\
    tests/**,\
    tools/**,\
    sql/**,\
    specs/**,\
    **/*.min.js,\
    **/*.min.css,\
    **/leaflet*.js,\
    **/leaflet*.css,\
    **/usng.js,\
    **/gridstack*.js,\
    **/gridstack*.css,\
    **/moment*.js,\
    **/chart*.js,\
    **/gd_image*.php

# Analysis tuning
sonar.php.file.suffixes=.php
sonar.javascript.file.suffixes=.js
sonar.css.file.suffixes=.css
