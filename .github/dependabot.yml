# Dependabot — free on public & private repos. Opens PRs for security fixes and
# (weekly) version bumps. Alerts + security updates are enabled in repo Settings;
# this file drives scheduled VERSION updates.
version: 2
updates:
  # PHP runtime dependencies (composer.json / composer.lock)
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
  # GitHub Actions used by the CI workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
  # Python bridge services (Meshtastic / DMR) — requirements.txt
  - package-ecosystem: "pip"
    directory: "/services/meshtastic"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
