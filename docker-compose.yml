# TicketsCAD NewUI v4 — full deployment stack (app + MariaDB).
#
#   1. cp .env.example .env      # then edit the passwords in .env
#   2. docker compose up -d      # builds the app image, starts DB + app
#   3. open http://localhost:8081  (admin password is printed in the logs:
#                                   docker compose logs app | grep -i password)
#
# The app auto-installs the schema on first run and auto-applies migrations on
# every subsequent `docker compose up` (idempotent). Data, uploads and the
# encryption keys live in named volumes so they survive container recreation.
services:
  db:
    image: mariadb:11
    container_name: ticketscad_db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${NEWUI_DB_NAME:-newui}
      MARIADB_USER: ${NEWUI_DB_USER:-newui}
      MARIADB_PASSWORD: ${NEWUI_DB_PASS:-newui}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change-me-root}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  app:
    build: .
    image: ticketscad-newui:local
    container_name: ticketscad_newui
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NEWUI_DB_HOST: db
      NEWUI_DB_NAME: ${NEWUI_DB_NAME:-newui}
      NEWUI_DB_USER: ${NEWUI_DB_USER:-newui}
      NEWUI_DB_PASS: ${NEWUI_DB_PASS:-newui}
      NEWUI_BASE_URL: ${NEWUI_BASE_URL:-http://localhost:8081}
      # First-run admin. Leave ADMIN_PASSWORD blank to auto-generate one
      # (printed in `docker compose logs app`). First login forces a change.
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.invalid}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      # Seed demo incident types / sample units + facilities on first install.
      NEWUI_SEED_DEMO: ${NEWUI_SEED_DEMO:-false}
    ports:
      - "${NEWUI_PORT:-8081}:80"
    volumes:
      - app_uploads:/var/www/html/uploads
      - app_cache:/var/www/html/cache
      - app_keys:/var/www/keys          # 2FA + RSA field-encryption keys (out of webroot)
      # To supply your own config.php instead of the env-generated one, mount it:
      # - ./config.php:/var/www/html/config.php:ro

volumes:
  db_data:
  app_uploads:
  app_cache:
  app_keys:
